<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#FF4E8C"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#E8A000"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="16" cy="16" r="15.5" fill="url(#bg)"/>
  <!-- Gold coin -->
  <circle cx="16" cy="16" r="10.5" fill="url(#gold)"/>
  <circle cx="16" cy="16" r="9" fill="none" stroke="#B8860B" stroke-width="0.5" opacity="0.4"/>
  <!-- V left leg -->
  <polygon points="8,11 10.5,11 14,20.5 12.5,20.5" fill="#644000"/>
  <!-- V right leg -->
  <polygon points="12.5,20.5 14,20.5 17.5,11 15,11" fill="#644000"/>
  <!-- $ vertical bar -->
  <rect x="20.8" y="10" width="1.4" height="12" rx="0.7" fill="#644000"/>
  <!-- $ upper arc (S top) -->
  <path d="M23.8,11.5 A2.5,2.5 0 0,1 23.8,16 L22.5,16 A1.2,1.2 0 0,0 22.5,11.5 Z" fill="#644000"/>
  <!-- $ lower arc (S bottom) -->
  <path d="M19.2,16 A2.5,2.5 0 0,0 19.2,21.5 L20.5,21.5 A1.2,1.2 0 0,1 20.5,16 Z" fill="#644000"/>
