<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#FF4E8C"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#E8A000"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15.5" fill="url(#bg)"/>

  <!-- Gold coin -->
  <circle cx="16" cy="16" r="10.5" fill="url(#gold)"/>
  <circle cx="16" cy="16" r="9" fill="none" stroke="#B8860B" stroke-width="0.5" opacity="0.5"/>

  <!-- V: left leg -->
  <polygon points="8.5,11 10.8,11 14.2,19.5 13,21.5 " fill="#7B4F00"/>
  <!-- V: right leg -->
  <polygon points="13,21.5 14.2,19.5 17.5,11 15.2,11" fill="#7B4F00"/>

  <!-- $: vertical bar through center -->
  <rect x="21.2" y="10.2" width="1.6" height="11.6" rx="0.8" fill="#7B4F00"/>
  <!-- $: top arc suggestion (horizontal bar top) -->
  <rect x="19" y="11.5" width="4.2" height="1.4" rx="0.7" fill="#7B4F00"/>
  <!-- $: middle bar -->
  <rect x="19" y="15.3" width="4.2" height="1.4" rx="0.7" fill="#7B4F00"/>
  <!-- $: bottom bar -->
  <rect x="19" y="19" width="4.2" height="1.4" rx="0.7" fill="#7B4F00"/>
</svg>
